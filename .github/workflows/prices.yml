name: update prices

on:
  schedule:
    # KRX session 09:00-15:40 KST = 00:00-06:40 UTC, every 30 min
    - cron: "0,30 0-7 * * 1-5"
    # US session 09:30-16:00 ET = 13:30-21:00 UTC, every 30 min
    - cron: "0,30 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install yfinance

      - run: python scripts/update_prices.py

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "prices: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
